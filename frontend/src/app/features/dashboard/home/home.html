<div class="dashboard">

  <div class="welcome-card" >

    <h1>
      Welcome,
      {{ this.userService.getUser()?.fullName  }}
         ({{ this.userService.getUser()?.role }})
    </h1>

    <p>
      Here's your DailyPulse overview.
    </p>

  </div>

  <div class="stats-grid">

    <div class="card">
      <h3>All Quotes</h3>
      <p>{{ quotes.length }}</p>
    </div>

    <div class="card">
      <h3>Published</h3>
      <p>{{ publishedQuotes.length }}</p>
    </div>

    <div class="card">
      <h3>Drafts</h3>
      <p>{{ draftQuotes.length }}</p>
    </div>

    <div class="card">
      <h3>Scheduled</h3>
      <p>{{ scheduledQuotes.length }}</p>
    </div>

  </div>

</div>
