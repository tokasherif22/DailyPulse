
<div class="create-container">
  <h1>Create quote</h1>

  <label>Topic</label>
  <select [(ngModel)]="quote.topic">
    <option value="" disabled>Select a topic</option>
    <option *ngFor="let topic of topics" [value]="topic">
      {{ topic }}
    </option>
  </select>
  
  <div class="quote-label-row">
    <label>Quote</label>
    <button
      class="btn-ai"
      type="button"
      (click)="generateByAI()"
      [disabled]="aiLoading || !quote.topic">
      <span class="ai-icon">✦</span>
      {{ aiLoading ? 'Generating...' : 'Generate by AI' }}
    </button>
  </div>


  <textarea rows="6" [(ngModel)]="quote.text" placeholder="Write your quote..."></textarea>

  <!-- Try again — only visible after AI generates a quote -->
  <div class="try-again-row" *ngIf="quote.isAIGenerated && quote.text">
    <span class="try-again-hint">If the quote didn't meet your expectations:</span>
    <button
      class="btn-try-again"
      type="button"
      (click)="regenerateByAI()"
      [disabled]="aiLoading || !quote.topic">
      <span>↻</span>
      {{ aiLoading ? 'Generating...' : 'Try again' }}
    </button>
  </div>


  <div class="alert-error" *ngIf="errorMessage">
    <span>!</span>
    <span>{{ errorMessage }}</span>
  </div>

  <div class="actions">
    <button (click)="publish()" [disabled]="loading">
      {{ loading ? 'Saving...' : 'Publish' }}
    </button>
    <button (click)="saveDraft()" [disabled]="loading">
      {{ loading ? 'Saving...' : 'Save Draft' }}
    </button>
    <button (click)="reset()">Clear</button>
  </div>
</div>
