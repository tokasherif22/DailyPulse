<form
  [formGroup]="form"
  (ngSubmit)="submit()">

  <div>
    <input
      type="text"
      formControlName="fullName"
      placeholder="Full Name">
  </div>

  <br>

  <div>
    <input
      type="email"
      formControlName="email"
      placeholder="Email">
  </div>

  <br>

  <div>
    <input
      type="password"
      formControlName="password"
      placeholder="Password">
  </div>

  <br>

  <button type="submit">
    Register
  </button>

</form>
