
<form
  [formGroup]="form"
  (ngSubmit)="submit()">

 
  <div class="alert-error" *ngIf="errorMessage">
    <span class="alert-icon">!</span>
    <span>{{ errorMessage }}</span>
  </div>

  <br>


  <div>
    <input
      type="email"
      formControlName="email"
      placeholder="Email">
  </div>

  <br>

  <div>
    <input
      type="password"
      formControlName="password"
      placeholder="Password">
  </div>

  <br>

  <button type="submit">
    {{ loading ? 'Signing in...' : 'Login' }}
  </button>

</form>
